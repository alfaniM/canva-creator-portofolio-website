backend:
  name: git-gateway
  branch: main
  repo: alfaniM/canva-creator-portofolio-website # TAMBAHKAN BARIS INI (disesuaikan dengan username/repo)


media_folder: "public/uploads" # Media files will be stored in the repo under public/uploads
public_folder: "/uploads" # The src attribute for uploaded media will begin with /uploads

collections:
  - name: "portfolio" # Used in routes, e.g., /admin/collections/portfolio
    label: "Portfolio Work" # Used in the UI
    folder: "src/content/portfolio" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image"}
      - {
          label: "Category", 
          name: "category", 
          widget: "select", 
          options: ["Swana Wedding Organizer", "Elhaqq Tour & Travel", "Everlenss", "Other"]
        }
      - {label: "Canva Link", name: "canva_link", widget: "string", required: false}
      - {label: "Order", name: "order", widget: "number", default: 0, required: false}
      - {
          label: "Gallery Images",
          name: "gallery",
          widget: "list",
          required: false,
          field: {label: "Image", name: "image", widget: "image"}
        }
      - {
          label: "Layout Template", 
          name: "layout_template", 
          widget: "select", 
          options: ["bento", "basic", "side-by-side"],
          default: "bento"
        }
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "site_data"
    label: "Site Global Data"
    files:
      - label: "Site Configuration"
        name: "site"
        file: "src/data/site.json"
        fields:
          - label: "Personal Info"
            name: "personal"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Bio", name: "bio", widget: "text"}
              - {label: "Photo URL", name: "photo_url", widget: "image"}
          - label: "Contact Info"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Email", name: "email", widget: "string"}
              - {label: "WhatsApp URL", name: "whatsapp", widget: "string", required: false}
          - label: "Social Links"
            name: "social_links"
            widget: "list"
            fields:
              - {label: "Platform Name", name: "platform", widget: "string"}
              - {label: "Icon Class (e.g., fa-brands fa-instagram)", name: "icon", widget: "string"}
              - {label: "Profile URL", name: "url", widget: "string"}
              - {label: "Display Label (e.g., @username)", name: "label", widget: "string"}
              - {label: "Brand Color (Hex)", name: "color", widget: "color", default: "#00C4CC"}
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Number", name: "number", widget: "string"}
              - {label: "Label", name: "label", widget: "string"}
          - label: "Experience"
            name: "experience"
            widget: "list"
            fields:
              - {label: "Year", name: "year", widget: "string"}
              - {label: "Company", name: "company", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
